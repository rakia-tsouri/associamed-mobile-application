<!DOCTYPE html>
<html lang="fr" class="h-full bg-gray-50">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Suivi des Salles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
        }

        .nav-active {
            background: linear-gradient(to right, #3730a3, #4f46e5);
            border-left: 4px solid #818cf8;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* Loading Screen Animation */
        #splash-screen {
            background: radial-gradient(circle at center, #ffffff 0%, #f3f4f6 100%);
        }

        .logo-charge {
            animation: pulse-logo 2.5s infinite ease-in-out;
        }

        @keyframes pulse-logo {
            0% {
                transform: scale(0.95);
                opacity: 0.8;
                filter: drop-shadow(0 0 0px rgba(79, 70, 229, 0));
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
                filter: drop-shadow(0 0 20px rgba(79, 70, 229, 0.3));
            }

            100% {
                transform: scale(0.95);
                opacity: 0.8;
                filter: drop-shadow(0 0 0px rgba(79, 70, 229, 0));
            }
        }

        .loading-bar {
            width: 0%;
            animation: charge 2s forwards ease-out;
        }

        @keyframes charge {
            to {
                width: 100%;
            }
        }
    </style>
</head>

<body class="h-full bg-gray-50">
    <!-- Splash Screen / Loading -->
    <div id="splash-screen"
        class="fixed inset-0 z-[100] flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="relative mb-8">
            <img id="splash-logo" src="https://associamed.org/wp-content/uploads/2024/09/Couleurs.svg"
                alt="Associa-Med Logo" class="w-48 h-48 logo-charge">
        </div>
        <div class="w-64 h-1.5 bg-gray-200 rounded-full overflow-hidden">
            <div class="h-full bg-indigo-600 loading-bar"></div>
        </div>
        <p class="mt-4 text-indigo-900 font-bold tracking-widest text-sm uppercase animate-pulse">Chargement
            Associa-Med...</p>
    </div>

    <div id="app" class="flex h-screen overflow-hidden opacity-0 transition-opacity duration-1000">
        <!-- Sidebar -->
        <aside class="w-72 bg-indigo-950 text-white flex-shrink-0 flex flex-col shadow-2xl z-20 relative">
            <div class="absolute inset-0 bg-gradient-to-b from-indigo-900/50 to-transparent pointer-events-none"></div>
            <div class="p-8">
                <div class="flex flex-col items-start space-y-4">
                    <img src="https://associamed.org/wp-content/uploads/2024/09/Couleurs.svg" alt="Associa-Med"
                        class="h-16 w-auto drop-shadow-lg">
                    <h1 class="text-xl font-bold tracking-tight">Admin<span class="text-indigo-400">Hub</span></h1>
                </div>
            </div>
            <nav class="mt-6 flex-1 px-4 space-y-1">
                <button id="nav-users"
                    class="w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg nav-active hover:bg-indigo-800 transition">
                    <span class="mr-3 text-lg">👥</span> Utilisateurs
                </button>
                <button id="nav-rooms"
                    class="w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg hover:bg-indigo-800 transition">
                    <span class="mr-3 text-lg">🛋️</span> Gestion Salles
                </button>
            </nav>
            <div class="mt-auto p-4 border-t border-indigo-800">
                <button id="logout-btn"
                    class="w-full text-left px-4 py-2 text-sm text-indigo-200 hover:text-white transition">
                    Déconnexion
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-gray-50 flex flex-col">
            <header
                class="bg-white/80 backdrop-blur-md border-b border-gray-100 px-8 py-6 flex justify-between items-center sticky top-0 z-10 transition-all duration-300">
                <div class="flex items-center space-x-8">
                    <div>
                        <h2 id="view-title" class="text-3xl font-black text-gray-900 tracking-tight">Utilisateurs</h2>
                        <p id="view-subtitle" class="text-sm text-gray-400 font-medium">Gérez les accès et les rôles.
                        </p>
                    </div>
                    <!-- Metrics Section -->
                    <div id="metrics-container"
                        class="hidden md:flex items-center space-x-4 border-l border-gray-100 pl-8">
                        <div class="flex flex-col">
                            <span
                                class="text-[10px] font-black text-indigo-400 uppercase tracking-widest leading-none mb-1">Total
                                Salles</span>
                            <span id="stat-rooms" class="text-xl font-black text-gray-900 leading-none">--</span>
                        </div>
                        <div class="flex flex-col border-l border-gray-100 pl-4">
                            <span
                                class="text-[10px] font-black text-indigo-400 uppercase tracking-widest leading-none mb-1">Membres</span>
                            <span id="stat-users" class="text-xl font-black text-gray-900 leading-none">--</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="flex items-center bg-gray-50 rounded-2xl px-4 py-2 border border-gray-100 shadow-inner">
                        <span class="text-[10px] font-black text-gray-400 mr-2 uppercase tracking-widest">Source</span>
                        <button id="toggle-data-source"
                            class="text-[10px] font-black px-3 py-1.5 rounded-xl bg-indigo-500 text-white shadow-lg shadow-indigo-100 uppercase transition-all hover:scale-105 active:scale-95">Mock
                            Active</button>
                    </div>
                    <button id="action-btn"
                        class="bg-gradient-to-r from-indigo-600 to-indigo-800 hover:shadow-2xl hover:shadow-indigo-200 text-white px-6 py-3 rounded-2xl text-xs font-black uppercase tracking-widest transition-all hover:-translate-y-0.5 active:translate-y-0">
                        + Ajouter Utilisateur
                    </button>
                </div>
            </header>

            <div class="p-8">
                <div id="content-container"
                    class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <!-- Dynamic rendering happens here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Base -->
    <div id="modal-container"
        class="fixed inset-0 z-50 hidden items-center justify-center bg-gray-900/60 backdrop-blur-sm px-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
            <div id="modal-content" class="p-6"></div>
        </div>
    </div>

    <script src="mock.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>
</body>

</html>
