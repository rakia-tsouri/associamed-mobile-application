<!DOCTYPE html>
<html lang="fr" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Suivi des Salles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .nav-active { background-color: #3730a3; border-left: 4px solid #818cf8; }
    </style>
</head>
<body class="h-full">
    <div id="app" class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-indigo-900 text-white flex-shrink-0 flex flex-col">
            <div class="p-6">
                <h1 class="text-2xl font-bold flex items-center">
                    <span class="mr-2">🏥</span> AdminHub
                </h1>
            </div>
            <nav class="mt-6 flex-1 px-4 space-y-1">
                <button id="nav-users" class="w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg nav-active hover:bg-indigo-800 transition">
                    <span class="mr-3 text-lg">👥</span> Utilisateurs
                </button>
                <button id="nav-rooms" class="w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg hover:bg-indigo-800 transition">
                    <span class="mr-3 text-lg">🛋️</span> Gestion Salles
                </button>
            </nav>
            <div class="mt-auto p-4 border-t border-indigo-800">
                <button id="logout-btn" class="w-full text-left px-4 py-2 text-sm text-indigo-200 hover:text-white transition">
                    Déconnexion
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-gray-50 flex flex-col">
            <header class="bg-white border-b border-gray-200 px-8 py-6 flex justify-between items-center sticky top-0 z-10">
                <div>
                    <h2 id="view-title" class="text-2xl font-bold text-gray-900">Utilisateurs</h2>
                    <p id="view-subtitle" class="text-sm text-gray-500">Gérez les accès et les rôles.</p>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="flex items-center bg-gray-100 rounded-full px-4 py-1.5 border border-gray-200">
                        <span class="text-[10px] font-bold text-gray-400 mr-2 uppercase tracking-widest">Source</span>
                        <button id="toggle-data-source" class="text-[10px] font-bold px-2.5 py-1 rounded-full bg-blue-500 text-white shadow-sm ring-2 ring-blue-200 uppercase transition-all">Mock Active</button>
                    </div>
                    <button id="action-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-semibold shadow-lg shadow-indigo-200 transition">
                        + Ajouter Utilisateur
                    </button>
                </div>
            </header>

            <div class="p-8">
                <div id="content-container" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <!-- Dynamic rendering happens here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Base -->
    <div id="modal-container" class="fixed inset-0 z-50 hidden items-center justify-center bg-gray-900/60 backdrop-blur-sm px-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
            <div id="modal-content" class="p-6"></div>
        </div>
    </div>

    <script src="mock.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
